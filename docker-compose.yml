services:
  # ─── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: sdfitness_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sdfitness
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Mongo Express (DB GUI) ────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: sdfitness_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: sdfitness_mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  # ─── Python ML Service ─────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sdfitness_ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PORT=5001
      - MONGO_URI=${FOOD_DB_URI}
      - DB_NAME=${FOOD_DB_NAME}
      # Used by the scraper to POST results back to the Node backend.
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./ml-service:/app
      - ml_models:/app/model/artifacts
      - ml_pip_cache:/usr/local/lib/python3.11/site-packages
      - ml_playwright_cache:/root/.cache/ms-playwright
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')" ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ─── Node.js Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sdfitness_backend
    restart: unless-stopped
    ports:
      - "5005:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sdfitness
      - ML_SERVICE_URL=http://ml-service:5001
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend (Vite) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sdfitness_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5005/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # ─── React Admin Panel (Vite) ──────────────────────────────
  admin-pannel:
    build:
      context: ./admin-pannel
      dockerfile: Dockerfile.dev
    container_name: sdfitness_admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:5005/api
    volumes:
      - ./admin-pannel:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongo_data:
  ml_models:
  ml_pip_cache:
  backend_node_modules:
  frontend_node_modules:
  admin_node_modules:
  ml_playwright_cache:
